name: Setup yral-auth Deploy User

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  prepare-servers:
    name: Prepare Server List
    runs-on: ubuntu-latest
    outputs:
      servers: ${{ steps.parse.outputs.servers }}
    steps:
      - name: Parse server hosts
        id: parse
        run: |
          HOSTS='${{ vars.HETZNER_HOSTS }}'
          echo "servers=$HOSTS" >> $GITHUB_OUTPUT

  generate-and-store-key:
    name: Generate SSH Key and Store in Vault
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    outputs:
      public_key: ${{ steps.keygen.outputs.public_key }}

    steps:
      - name: Generate SSH key pair
        id: keygen
        run: |
          ssh-keygen -t ed25519 \
            -C "yral-auth-deploy-$(date +%Y%m%d)" \
            -f /tmp/new_deploy_key \
            -N ""
          echo "public_key=$(cat /tmp/new_deploy_key.pub)" >> $GITHUB_OUTPUT

      - name: Install Vault CLI
        run: |
          wget -O- https://apt.releases.hashicorp.com/gpg | sudo gpg --dearmor -o /usr/share/keyrings/hashicorp-archive-keyring.gpg
          echo "deb [signed-by=/usr/share/keyrings/hashicorp-archive-keyring.gpg] https://apt.releases.hashicorp.com $(lsb_release -cs) main" | sudo tee /etc/apt/sources.list.d/hashicorp.list
          sudo apt-get update && sudo apt-get install -y vault

      - name: Authenticate to Vault
        uses: hashicorp/vault-action@v3
        with:
          url: https://vault.yral.com
          method: jwt
          role: yral-auth-v2-write-role
          jwtGithubAudience: "https://github.com/dolr-ai"
          exportToken: true

      - name: Store private key in Vault
        run: |
          NEW_PRIVATE_KEY=$(cat /tmp/new_deploy_key)
          echo "::add-mask::$NEW_PRIVATE_KEY"
          vault kv put secret/yral-auth-v2/SSH_PRIVATE_KEY value="$NEW_PRIVATE_KEY"
          echo "Private key stored in Vault at secret/yral-auth-v2/SSH_PRIVATE_KEY"
        env:
          VAULT_ADDR: https://vault.yral.com

      - name: Cleanup
        if: always()
        run: |
          rm -f /tmp/new_deploy_key /tmp/new_deploy_key.pub

  setup-user:
    name: Setup yral-auth on ${{ matrix.host }}
    needs: [prepare-servers, generate-and-store-key]
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    strategy:
      fail-fast: false
      matrix:
        host: ${{ fromJson(needs.prepare-servers.outputs.servers) }}

    steps:
      - name: Setup root SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.HETZNER_BARE_METAL_GITHUB_ACTIONS_SSH_PRIVATE_KEY }}

      - name: Add server to known hosts
        run: |
          ssh-keyscan -H ${{ matrix.host }} >> ~/.ssh/known_hosts

      - name: Verify root connectivity
        run: |
          ssh -o ConnectTimeout=10 root@${{ matrix.host }} \
            "echo 'Root connection successful on ${{ matrix.host }}'"

      - name: Create user and setup SSH on server
        run: |
          PUB_KEY="${{ needs.generate-and-store-key.outputs.public_key }}"

          # Create user and directory structure
          ssh root@${{ matrix.host }} "
            set -e
            if id 'yral-auth' &>/dev/null; then
              echo 'User yral-auth already exists, skipping creation'
            else
              useradd -m -s /bin/bash 'yral-auth'
              echo 'User yral-auth created'
            fi
            chown yral-auth:yral-auth /home/yral-auth
            mkdir -p /home/yral-auth/.ssh
            chmod 700 /home/yral-auth/.ssh
            touch /home/yral-auth/.ssh/authorized_keys
            chmod 600 /home/yral-auth/.ssh/authorized_keys
            chown -R yral-auth:yral-auth /home/yral-auth/.ssh
            usermod -aG docker yral-auth
            echo 'User setup complete'
          "

          # Write public key via stdin to avoid quoting issues
          echo "$PUB_KEY" | ssh root@${{ matrix.host }} \
            "cat > /home/yral-auth/.ssh/authorized_keys && \
             chown yral-auth:yral-auth /home/yral-auth/.ssh/authorized_keys"

      - name: Verify authorized_keys on server
        run: |
          ssh root@${{ matrix.host }} "
            echo '=== authorized_keys content ==='
            cat /home/yral-auth/.ssh/authorized_keys
            echo '=== permissions ==='
            ls -la /home/yral-auth/.ssh/
          "

      - name: Import SSH key from Vault
        uses: hashicorp/vault-action@v3
        with:
          url: https://vault.yral.com
          method: jwt
          role: yral-auth-v2-role
          jwtGithubAudience: "https://github.com/dolr-ai"
          secrets: |
            secret/data/yral-auth-v2/SSH_PRIVATE_KEY value | SSH_PRIVATE_KEY ;

      - name: Load new SSH key into agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ env.SSH_PRIVATE_KEY }}

      - name: Test SSH and docker group
        run: |
          ssh -o PasswordAuthentication=no \
              yral-auth@${{ matrix.host }} \
              "echo 'SSH verified on ${{ matrix.host }}' && groups | grep docker && echo 'Docker group verified' || echo 'WARNING: docker group not active yet, re-login required'"
name: Deploy to Hetzner Bare Metal

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read
  packages: write

concurrency:
  group: deploy-hetzner-${{ github.ref }}
  cancel-in-progress: false

env:
  DOCKER_REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build_check:
    uses: ./.github/workflows/build-check.yml
    with:
      publish-artifact: true
    secrets: inherit

  build-and-push:
    name: Build and Push Docker Images
    needs: build_check
    runs-on: ubuntu-latest

    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: build-musl

      - name: Make binary executable
        run: chmod +x target/x86_64-unknown-linux-musl/release/yral-auth-v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.DOCKER_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for yral-auth-v2
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKER_REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,format=long,prefix=
            type=raw,value=latest

      - name: Build and push yral-auth-v2 image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./deploy/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to Hetzner (${{ matrix.host }})
    needs: build-and-push
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        host: ${{ fromJson(vars.HETZNER_HOSTS) }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.HETZNER_BARE_METAL_GITHUB_ACTIONS_SSH_PRIVATE_KEY }}

      - name: Add server to known hosts
        run: |
          ssh-keyscan -H ${{ matrix.host }} >> ~/.ssh/known_hosts

      - name: Check server connectivity
        run: |
          ssh -o ConnectTimeout=10 root@${{ matrix.host }} "echo 'Server connection successful'"
      
      - name: Import Secrets from Vault
        uses: hashicorp/vault-action@v3
        with:
          url: https://vault.yral.com
          method: jwt
          role: yral-auth-v2-role
          jwtGithubAudience: "https://github.com/dolr-ai"
          secrets: |
            secret/data/yral-auth-v2/AUTH_SESSION_COOKIE_SIGNING_SECRET_KEY value | COOKIE_KEY ;
            secret/data/yral-auth-v2/GOOGLE_SIGNING_OAUTH_CLIENT_CREDENTIAL_CLIENT_SECRET value | GOOGLE_CLIENT_SECRET ;
            secret/data/yral-auth-v2/AUTH_JWT_ES256_SIGNING_SECRET_KEY_PEM value | JWT_EC_PEM ;
            secret/data/yral-auth-v2/CLIENT_JWT_ED_PEM value | CLIENT_JWT_ED_PEM ;
            secret/data/yral-auth-v2/APPLE_AUTH_KEY_PEM value | APPLE_AUTH_KEY_PEM ;
            secret/data/yral-auth-v2/WHATAPP_MESSAGE_SERVICE_API_KEY value | WHATSAPP_API_KEY ;
            secret/data/yral-auth-v2/DRAGONFLY_REDIS_STORE_CA_CERT value | DRAGONFLY_REDIS_STORE_CA_CERT ;
            secret/data/yral-auth-v2/DRAGONFLY_REDIS_STORE_CLIENT_CERT value | DRAGONFLY_REDIS_STORE_CLIENT_CERT ;
            secret/data/yral-auth-v2/DRAGONFLY_REDIS_STORE_CLIENT_KEY value | DRAGONFLY_REDIS_STORE_CLIENT_KEY ;
            secret/data/yral-auth-v2/DRAGONFLY_REDIS_STORE_HOSTS value | DRAGONFLY_REDIS_STORE_HOSTS ;
            secret/data/yral-auth-v2/DRAGONFLY_REDIS_STORE_PASSWORD value | DRAGONFLY_REDIS_STORE_PASSWORD ;
            secret/data/DRAGONFLY_CLUSTER_1_PASSWORD value | DRAGONFLY_PASSWORD ;
            secret/data/DRAGONFLY_CLUSTER_1_HOSTS value | DRAGONFLY_HOSTS ;
            secret/data/DRAGONFLY_CLUSTER_1_CA_CERT value | DRAGONFLY_CA_CERT ;
            secret/data/DRAGONFLY_CLUSTER_1_CLIENT_CERT value | DRAGONFLY_CLIENT_CERT ;
            secret/data/DRAGONFLY_CLUSTER_1_CLIENT_KEY value | DRAGONFLY_CLIENT_KEY ;

      - name: Sync deployment files to server
        run: |
          rsync -avz --delete \
            ./deploy/ \
            root@${{ matrix.host }}:/home/yral-auth/

      - name: Log in to GitHub Container Registry on server
        run: |
          ssh root@${{ matrix.host }} "
            echo '${{ secrets.GITHUB_TOKEN }}' | docker login ghcr.io -u ${{ github.actor }} --password-stdin
          "

      - name: Deploy with Docker Compose
        env:
          COOKIE_KEY: ${{ env.COOKIE_KEY }}
          GOOGLE_CLIENT_SECRET: ${{ env.GOOGLE_CLIENT_SECRET }}
          JWT_EC_PEM: ${{ env.JWT_EC_PEM }}
          CLIENT_JWT_ED_PEM: ${{ env.CLIENT_JWT_ED_PEM }}
          APPLE_AUTH_KEY_PEM: ${{ env.APPLE_AUTH_KEY_PEM }}
          WHATSAPP_API_KEY: ${{ env.WHATSAPP_API_KEY }}
          DRAGONFLY_PASSWORD: ${{ env.DRAGONFLY_PASSWORD }}
          DRAGONFLY_HOSTS: ${{ env.DRAGONFLY_HOSTS }}
          DRAGONFLY_CA_CERT: ${{ env.DRAGONFLY_CA_CERT }}
          DRAGONFLY_CLIENT_CERT: ${{ env.DRAGONFLY_CLIENT_CERT }}
          DRAGONFLY_CLIENT_KEY: ${{ env.DRAGONFLY_CLIENT_KEY }}
          DRAGONFLY_REDIS_STORE_CA_CERT: ${{ env.DRAGONFLY_REDIS_STORE_CA_CERT }}
          DRAGONFLY_REDIS_STORE_CLIENT_CERT: ${{ env.DRAGONFLY_REDIS_STORE_CLIENT_CERT }}
          DRAGONFLY_REDIS_STORE_CLIENT_KEY: ${{ env.DRAGONFLY_REDIS_STORE_CLIENT_KEY }}
          DRAGONFLY_REDIS_STORE_HOSTS: ${{ env.DRAGONFLY_REDIS_STORE_HOSTS }}
          DRAGONFLY_REDIS_STORE_PASSWORD: ${{ env.DRAGONFLY_REDIS_STORE_PASSWORD }}
        run: |
          ssh root@${{ matrix.host }} "
            cd /home/yral-auth

            echo 'Pulling latest images...'
            APP_IMAGE=ghcr.io/${{ github.repository }} \
            IMAGE_TAG=${{ github.sha }} \
            docker compose pull

            echo 'Stopping existing containers...'
            docker compose down --remove-orphans || true

            echo 'Starting services...'
            APP_IMAGE=ghcr.io/${{ github.repository }} \
            IMAGE_TAG=${{ github.sha }} \
            COOKIE_KEY='${COOKIE_KEY}' \
            GOOGLE_CLIENT_SECRET='${GOOGLE_CLIENT_SECRET}' \
            JWT_EC_PEM='${JWT_EC_PEM}' \
            CLIENT_JWT_ED_PEM='${CLIENT_JWT_ED_PEM}' \
            APPLE_AUTH_KEY_PEM='${APPLE_AUTH_KEY_PEM}' \
            WHATSAPP_API_KEY='${WHATSAPP_API_KEY}' \
            DRAGONFLY_PASSWORD='${DRAGONFLY_PASSWORD}' \
            DRAGONFLY_HOSTS='${DRAGONFLY_HOSTS}' \
            DRAGONFLY_CA_CERT='${DRAGONFLY_CA_CERT}' \
            DRAGONFLY_CLIENT_CERT='${DRAGONFLY_CLIENT_CERT}' \
            DRAGONFLY_CLIENT_KEY='${DRAGONFLY_CLIENT_KEY}' \
            DRAGONFLY_REDIS_STORE_CA_CERT='${DRAGONFLY_REDIS_STORE_CA_CERT}' \
            DRAGONFLY_REDIS_STORE_CLIENT_CERT='${DRAGONFLY_REDIS_STORE_CLIENT_CERT}' \
            DRAGONFLY_REDIS_STORE_CLIENT_KEY='${DRAGONFLY_REDIS_STORE_CLIENT_KEY}' \
            DRAGONFLY_REDIS_STORE_HOSTS='${DRAGONFLY_REDIS_STORE_HOSTS}' \
            DRAGONFLY_REDIS_STORE_PASSWORD='${DRAGONFLY_REDIS_STORE_PASSWORD}' \
            docker compose up -d

            echo 'Waiting for services to start...'
            sleep 15

            echo 'Services status:'
            docker compose ps
          "

      - name: Verify deployment
        run: |
          ssh root@${{ matrix.host }} "
            cd /home/yral-auth

            echo '=== Container Status ==='
            docker compose ps

            echo ''
            echo '=== Container Logs (last 20 lines) ==='
            docker compose logs --tail=20 yral-auth 2>/dev/null || echo 'Logs not yet available'
          "

      - name: Deployment summary
        run: |
          echo "## Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "- **Target Server**: ${{ matrix.host }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Deployment Method**: Docker Compose" >> $GITHUB_STEP_SUMMARY
          echo "- **Images**:" >> $GITHUB_STEP_SUMMARY
          echo "  - ghcr.io/${{ github.repository }}:${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Services**: yral-auth, caddy" >> $GITHUB_STEP_SUMMARY
          echo "- **Secrets**: Injected via environment variables at runtime" >> $GITHUB_STEP_SUMMARY